<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Онлайн расписание автобусов</title>
</head>
<body>
    <div class="container d-grid gap-4" style="grid-template-columns: 1fr;">
        <h2>Ближайшее отправление автобусов</h2>
        <table id="bus" class="table table-striped table-bordered text-center">
            <thead>
                <tr>
                    <th>Номер автобуса</th>
                    <th>Маршрут</th>
                    <th>Дата</th>
                    <th>Время отправления</th>
                    <th>Интервал между рейсами (мин)</th>
                </tr>
            </thead>
            <tbody>
                <!-- <tr>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                </tr> -->
            </tbody>
        </table>
    </div>

    <script defer src="./js/script.js"></script>
</body>
</html>
