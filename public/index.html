<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./images/favicon_buses_timetable.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Онлайн расписание автобусов</title>
</head>
<body>
    <div class="container d-grid gap-4" style="grid-template-columns: 1fr;">
        <div class="d-flex justify-content-between align-items-center">
            <h2>Ближайшее отправление автобусов</h2>
            <div id="current-time-container" class="alert alert-primary d-flex align-items-center gap-2 p-2 mb-0">
                <span class="bi bi-clock-fill"></span>
                <span id="current-time" class="fw-bold"></span>
            </div>
        </div>
        <table id="bus" class="table table-striped table-bordered text-center align-middle">
            <thead>
                <tr>
                    <th>Номер автобуса</th>
                    <th>Маршрут</th>
                    <th>Дата</th>
                    <th>Время отправления</th>
                    <th>Интервал между рейсами (мин)</th>
                    <th>Оставшееся время до следующего рейса (мин)</th>
                </tr>
            </thead>
            <tbody>
                <!-- <tr>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                </tr> -->
            </tbody>
        </table>
    </div>

    <script defer src="./js/script.js"></script>
</body>
</html>
